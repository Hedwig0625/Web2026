<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Christmas Tree</title>
</head>
<body>
<h1>請按 F12 打開 Console 查看聖誕樹</h1>
<script>

       

        function tree(n) {

            printTreeTop(n);

            printTreeBottom(n);

        }

       

        function printTreeTop(n) {

            for (let i = 1; i <= n; i++) {

                let line = repeatchar(n - i, ' ') + repeatchar(2 * i - 1, '*');

                console.log(line);

            }

        }

       

        function printTreeBottom(n) {

            for (let i = 0; i < 3; i++) {

                let line = repeatchar(n - 1, ' ') + '*';

                console.log(line,i);

            }

        }

        

        function repeatchar(n, arg_char) {

            return arg_char.repeat(n);

        }

        

        tree(4);
</script>
</body>
</html>
